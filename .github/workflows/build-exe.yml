name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify deps importable
        run: |
          python -c "import ppf.datamatrix, PIL; print('deps OK')"

      - name: Build EXE
        run: pyinstaller --noconfirm --onefile --windowed --name sgtin-tool --collect-all ppf --collect-submodules ppf --hidden-import ppf.datamatrix --collect-all PIL --hidden-import PIL._tkinter_finder sgtin_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sgtin-tool-windows
          path: dist/sgtin-tool.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sgtin-tool.exe
